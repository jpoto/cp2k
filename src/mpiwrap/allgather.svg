<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">MPI_Allgather Operation</text>

  <!-- Section Labels -->
  <text x="150" y="90" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#555">Before</text>
  <text x="600" y="90" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#555">After</text>

  <!-- Process Rank Labels -->
  <text x="50" y="155" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Rank 0</text>
  <text x="50" y="255" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Rank 1</text>
  <text x="50" y="355" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Rank 2</text>

  <!-- Define Arrowhead for lines -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#888" />
    </marker>
  </defs>

  <!-- Connection Arrows (Showing data broadcasted to everyone) -->
  <g stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6">
    <!-- Rank 0 Data (A) spreading -->
    <line x1="180" y1="150" x2="525" y2="150" />
    <line x1="180" y1="150" x2="525" y2="250" />
    <line x1="180" y1="150" x2="525" y2="350" />
    
    <!-- Rank 1 Data (B) spreading -->
    <line x1="180" y1="250" x2="525" y2="150" />
    <line x1="180" y1="250" x2="525" y2="250" />
    <line x1="180" y1="250" x2="525" y2="350" />
    
    <!-- Rank 2 Data (C) spreading -->
    <line x1="180" y1="350" x2="525" y2="150" />
    <line x1="180" y1="350" x2="525" y2="250" />
    <line x1="180" y1="350" x2="525" y2="350" />
  </g>

  <!-- BEFORE STATE (Left Side) -->
  <!-- Rank 0: A -->
  <rect x="130" y="130" width="40" height="40" fill="#ff9999" stroke="#333" stroke-width="2" rx="4"/>
  <text x="150" y="156" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">A</text>

  <!-- Rank 1: B -->
  <rect x="130" y="230" width="40" height="40" fill="#99ff99" stroke="#333" stroke-width="2" rx="4"/>
  <text x="150" y="256" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">B</text>

  <!-- Rank 2: C -->
  <rect x="130" y="330" width="40" height="40" fill="#9999ff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="150" y="356" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">C</text>


  <!-- AFTER STATE (Right Side) -->
  <!-- Rank 0: A B C -->
  <rect x="540" y="130" width="40" height="40" fill="#ff9999" stroke="#333" stroke-width="2" rx="4"/>
  <text x="560" y="156" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">A</text>
  <rect x="580" y="130" width="40" height="40" fill="#99ff99" stroke="#333" stroke-width="2" rx="4"/>
  <text x="600" y="156" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">B</text>
  <rect x="620" y="130" width="40" height="40" fill="#9999ff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="640" y="156" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">C</text>

  <!-- Rank 1: A B C -->
  <rect x="540" y="230" width="40" height="40" fill="#ff9999" stroke="#333" stroke-width="2" rx="4"/>
  <text x="560" y="256" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">A</text>
  <rect x="580" y="230" width="40" height="40" fill="#99ff99" stroke="#333" stroke-width="2" rx="4"/>
  <text x="600" y="256" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">B</text>
  <rect x="620" y="230" width="40" height="40" fill="#9999ff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="640" y="256" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">C</text>

  <!-- Rank 2: A B C -->
  <rect x="540" y="330" width="40" height="40" fill="#ff9999" stroke="#333" stroke-width="2" rx="4"/>
  <text x="560" y="356" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">A</text>
  <rect x="580" y="330" width="40" height="40" fill="#99ff99" stroke="#333" stroke-width="2" rx="4"/>
  <text x="600" y="356" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">B</text>
  <rect x="620" y="330" width="40" height="40" fill="#9999ff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="640" y="356" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">C</text>

</svg>