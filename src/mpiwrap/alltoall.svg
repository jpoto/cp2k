<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">MPI_Alltoall Operation</text>

  <!-- Section Labels -->
  <text x="170" y="90" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#555">Before</text>
  <text x="400" y="225" font-family="Arial" font-size="14" font-style="italic" text-anchor="middle" fill="#888">(Data is distributed uniquely to each rank)</text>
  <text x="610" y="90" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#555">After</text>

  <!-- Process Rank Labels -->
  <text x="30" y="155" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Rank 0</text>
  <text x="30" y="255" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Rank 1</text>
  <text x="30" y="355" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Rank 2</text>

  <!-- Define Arrowhead for lines -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#bbb" />
    </marker>
  </defs>

  <!-- Connection Shuffle Arrows -->
  <g stroke="#bbb" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,5">
    <line x1="260" y1="150" x2="525" y2="150" />
    <line x1="260" y1="150" x2="525" y2="250" />
    <line x1="260" y1="150" x2="525" y2="350" />
    <line x1="260" y1="250" x2="525" y2="150" />
    <line x1="260" y1="250" x2="525" y2="250" />
    <line x1="260" y1="250" x2="525" y2="350" />
    <line x1="260" y1="350" x2="525" y2="150" />
    <line x1="260" y1="350" x2="525" y2="250" />
    <line x1="260" y1="350" x2="525" y2="350" />
  </g>

  <!-- BEFORE STATE (Left Side) -->
  <!-- Rank 0: A0, A1, A2 -->
  <rect x="110" y="130" width="40" height="40" fill="#ff9999" stroke="#333" stroke-width="2" rx="4"/>
  <text x="130" y="156" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">A0</text>
  
  <rect x="160" y="130" width="40" height="40" fill="#99ff99" stroke="#333" stroke-width="2" rx="4"/>
  <text x="180" y="156" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">A1</text>
  
  <rect x="210" y="130" width="40" height="40" fill="#9999ff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="230" y="156" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">A2</text>

  <!-- Rank 1: B0, B1, B2 -->
  <rect x="110" y="230" width="40" height="40" fill="#ff9999" stroke="#333" stroke-width="2" rx="4"/>
  <text x="130" y="256" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">B0</text>
  
  <rect x="160" y="230" width="40" height="40" fill="#99ff99" stroke="#333" stroke-width="2" rx="4"/>
  <text x="180" y="256" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">B1</text>
  
  <rect x="210" y="230" width="40" height="40" fill="#9999ff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="230" y="256" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">B2</text>

  <!-- Rank 2: C0, C1, C2 -->
  <rect x="110" y="330" width="40" height="40" fill="#ff9999" stroke="#333" stroke-width="2" rx="4"/>
  <text x="130" y="356" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">C0</text>
  
  <rect x="160" y="330" width="40" height="40" fill="#99ff99" stroke="#333" stroke-width="2" rx="4"/>
  <text x="180" y="356" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">C1</text>
  
  <rect x="210" y="330" width="40" height="40" fill="#9999ff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="230" y="356" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">C2</text>


  <!-- AFTER STATE (Right Side) -->
  <!-- Rank 0 gets all the '0' chunks (Red) -->
  <rect x="540" y="130" width="40" height="40" fill="#ff9999" stroke="#333" stroke-width="2" rx="4"/>
  <text x="560" y="156" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">A0</text>
  
  <rect x="590" y="130" width="40" height="40" fill="#ff9999" stroke="#333" stroke-width="2" rx="4"/>
  <text x="610" y="156" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">B0</text>
  
  <rect x="640" y="130" width="40" height="40" fill="#ff9999" stroke="#333" stroke-width="2" rx="4"/>
  <text x="660" y="156" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">C0</text>

  <!-- Rank 1 gets all the '1' chunks (Green) -->
  <rect x="540" y="230" width="40" height="40" fill="#99ff99" stroke="#333" stroke-width="2" rx="4"/>
  <text x="560" y="256" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">A1</text>
  
  <rect x="590" y="230" width="40" height="40" fill="#99ff99" stroke="#333" stroke-width="2" rx="4"/>
  <text x="610" y="256" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">B1</text>
  
  <rect x="640" y="230" width="40" height="40" fill="#99ff99" stroke="#333" stroke-width="2" rx="4"/>
  <text x="660" y="256" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">C1</text>

  <!-- Rank 2 gets all the '2' chunks (Blue) -->
  <rect x="540" y="330" width="40" height="40" fill="#9999ff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="560" y="356" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">A2</text>
  
  <rect x="590" y="330" width="40" height="40" fill="#9999ff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="610" y="356" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">B2</text>
  
  <rect x="640" y="330" width="40" height="40" fill="#9999ff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="660" y="356" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">C2</text>

</svg>